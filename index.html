<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molarity Calculator</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2784/2784487.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🧪 Molarity Calculator</h1>
    <p class="formula">
    Formula: Molarity = Moles ÷ Volume (L)
</p>
<p class="description">
    Molarity is the number of moles of solute dissolved in one liter of solution.
</p>

        <label for="moles">Enter Moles</label>
        <input type="number" id="moles" placeholder="Example: 2">

        <label for="volume">Enter Volume (L)</label>
        <input type="number" id="volume" placeholder="Example: 0.5">

       <button onclick="calculateMolarity()">Calculate</button>


<button onclick="resetCalculator()">Reset</button>
        <h2>Result</h2>

        <div class="result-box">
    <p id="result">Molarity = ? mol/L</p>
</div>
<hr>

<p class="footer">
    Created by <strong>Maha</strong><br>
    BS Biochemistry Student
</p>

    <script src="script.js"></script>

</body>
</html>
